services:
  samba-dc:
    image: ${SAMBA_AD_IMAGE}
    container_name: dc01
    hostname: ${DC_HOSTNAME}
    privileged: true
    networks:
      lan:
        ipv4_address: ${DC_IP}
    volumes:
      - samba-etc:/usr/local/samba/etc
      - samba-private:/usr/local/samba/private
      - samba-var:/usr/local/samba/var
    environment:
      REALM: ${REALM}
      DOMAIN: ${DOMAIN}
      ADMIN_PASS: ${ADMIN_PASSWORD}
      DNS_FORWARDER: ${DNS_FORWARDER}
      BIND_NETWORK_INTERFACES: "false"
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: ["CMD-SHELL", "samba-tool testparm -s >/dev/null 2>&1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s

  watchtower:
    image: ${WATCHTOWER_IMAGE}
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
    restart: unless-stopped

networks:
  lan:
    name: samba-ad-lan
    driver: macvlan
    driver_opts:
      parent: ${MACVLAN_PARENT}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}

volumes:
  samba-etc:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/samba-etc
  samba-private:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/samba-private
  samba-var:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/samba-var

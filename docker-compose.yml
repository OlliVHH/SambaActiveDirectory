services:
  samba-dc:
    image: ${SAMBA_AD_IMAGE}
    build:
      context: ./docker
      dockerfile: Dockerfile
      platforms:
        - linux/arm64
    container_name: dc01
    hostname: ${DC_HOSTNAME}
    privileged: true
    networks:
      lan:
        ipv4_address: ${DC_IP}
    volumes:
      - samba-data:/var/lib/samba
    env_file:
      - .env
    environment:
      REALM: ${REALM:-ad.orv.space}
      DOMAIN: ${DOMAIN:-AD}
      ADMIN_PASS: ${ADMIN_PASSWORD}
      DNS_FORWARDER: ${DNS_FORWARDER:-192.168.100.170}
      DC_HOST_IP: ${DC_IP}
      BIND_NETWORK_INTERFACES: "false"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "samba-tool testparm -s >/dev/null 2>&1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 180s

  watchtower:
    image: ${WATCHTOWER_IMAGE}
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
    restart: unless-stopped

networks:
  lan:
    name: samba-ad-lan
    driver: macvlan
    driver_opts:
      parent: ${MACVLAN_PARENT}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}

volumes:
  samba-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/samba

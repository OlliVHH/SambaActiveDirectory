services:
  samba-dc:
    image: ${SAMBA_AD_IMAGE}
    container_name: dc01
    hostname: ${DC_HOSTNAME}
    privileged: true
    networks:
      lan:
        ipv4_address: ${DC_IP}
    volumes:
      - samba-data:/var/lib/samba
      - ./config:/etc/samba-container:ro
    environment:
      SAMBACC_CONFIG: /etc/samba-container/config.json
      SAMBA_CONTAINER_ID: dc01
    restart: unless-stopped
    labels:
      - com.centurylinklabs.watchtower.enable=true
    healthcheck:
      test: ["CMD-SHELL", "samba-tool testparm -s 2>/dev/null || testparm -s 2>/dev/null"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 120s

  watchtower:
    image: ${WATCHTOWER_IMAGE}
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_SCHEDULE: ${WATCHTOWER_SCHEDULE}
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_ROLLING_RESTART: "true"
    restart: unless-stopped

networks:
  lan:
    name: samba-ad-lan
    driver: macvlan
    driver_opts:
      parent: ${MACVLAN_PARENT}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}

volumes:
  samba-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/samba

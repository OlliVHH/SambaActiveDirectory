services:
  samba-dc:
    image: ${SAMBA_AD_IMAGE}
    pull_policy: build
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: dc01
    hostname: ${DC_HOSTNAME}
    privileged: true
    networks:
      lan:
        ipv4_address: ${DC_IP}
    volumes:
      - samba-data:/var/lib/samba
    env_file:
      - .env
    environment:
      REALM: ${REALM:-ad.orv.space}
      DOMAIN: ${DOMAIN:-AD}
      ADMIN_PASS: ${ADMIN_PASSWORD}
      DNS_FORWARDER: ${DNS_FORWARDER:-192.168.100.170}
      DC_HOST_IP: ${DC_IP}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/lib/samba/private/secrets.keytab && { test -f /etc/samba/smb.conf || test -f /var/lib/samba/private/smb.conf; } && samba-tool testparm -s >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

networks:
  lan:
    name: samba-ad-lan
    driver: macvlan
    driver_opts:
      parent: ${MACVLAN_PARENT}
    ipam:
      config:
        - subnet: ${SUBNET}
          gateway: ${GATEWAY}

volumes:
  samba-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/data/samba
